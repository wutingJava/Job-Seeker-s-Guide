<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>求职者攻略 - 社会经济模拟器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', -apple-system, sans-serif; background: #1a1a2e; color: #e8e8e8; min-height: 100vh; }
.header { background: linear-gradient(90deg, #2d3a5f, #1a1a2e); padding: 20px 40px; border-bottom: 3px solid #4a9eff; }
.header h1 { font-size: 28px; color: #fff; margin-bottom: 5px; }
.header .subtitle { color: #8fa8c7; font-size: 14px; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
.stat-card { background: #2d3a5f; padding: 15px; border-radius: 8px; border-left: 4px solid #4a9eff; }
.stat-card.crisis { border-left-color: #ff4a4a; }
.stat-card.success { border-left-color: #4ade80; }
.stat-card.warning { border-left-color: #fbbf24; }
.stat-label { font-size: 12px; color: #8fa8c7; text-transform: uppercase; letter-spacing: 1px; }
.stat-value { font-size: 24px; color: #fff; font-weight: bold; margin-top: 5px; }
.stat-change { font-size: 12px; color: #4ade80; margin-top: 5px; }
.stat-change.down { color: #ff4a4a; }
.dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
.section { background: #2d3a5f; padding: 20px; border-radius: 8px; }
.section h2 { color: #4a9eff; font-size: 16px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #3a4a6f; }
.event-list { max-height: 400px; overflow-y: auto; }
.event-item { background: #1a1a2e; padding: 10px 15px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid #4a9eff; font-size: 13px; }
.event-item.crisis { border-left-color: #ff4a4a; background: #3d1a1a; }
.event-item.success { border-left-color: #4ade80; background: #1a3d1a; }
.event-item.era { border-left-color: #fbbf24; background: #3d3d1a; }
.event-time { font-size: 11px; color: #8fa8c7; margin-top: 3px; }
.progress-container { background: #1a1a2e; border-radius: 4px; height: 16px; margin-top: 8px; overflow: hidden; }
.progress-bar { background: linear-gradient(90deg, #4a9eff, #4ade80); height: 100%; transition: width 0.5s ease; }
.progress-label { font-size: 11px; color: #8fa8c7; margin-top: 5px; }
.controls { background: #2d3a5f; padding: 20px; border-radius: 8px; }
.button-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
.btn { background: #4a9eff; color: #fff; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
.btn:hover { background: #5aafff; transform: translateY(-2px); }
.btn.secondary { background: #3a4a6f; }
.btn.secondary:hover { background: #4a5a7f; }
.btn.danger { background: #ff4a4a; }
.btn.active { background: #4ade80; }
.btn:disabled { background: #555; cursor: not-allowed; opacity: 0.5; }
.sub-section { margin-top: 15px; padding: 15px; background: #1a1a2e; border-radius: 6px; }
.sub-section h3 { color: #8fa8c7; font-size: 13px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.policy-item { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 13px; }
.policy-item label { color: #e8e8e8; flex: 1; }
.policy-item input[type="range"] { flex: 2; margin: 0 10px; }
.policy-item .value { color: #4ade80; min-width: 60px; text-align: right; font-weight: bold; }
.log-container { background: #000; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
.log-entry { color: #4ade80; margin: 2px 0; }
.log-entry.warning { color: #fbbf24; }
.log-entry.error { color: #ff4a4a; }
.log-entry.info { color: #4a9eff; }
.era-badge { display: inline-block; padding: 3px 10px; background: #4a9eff; color: #fff; border-radius: 4px; font-size: 11px; margin-left: 10px; }
.popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2d3a5f; padding: 30px; border-radius: 12px; border: 3px solid #fbbf24; z-index: 1000; box-shadow: 0 0 50px rgba(74, 158, 255, 0.5); max-width: 500px; }
.popup h2 { color: #fbbf24; font-size: 22px; margin-bottom: 15px; }
.popup p { margin-bottom: 20px; line-height: 1.6; }
.popup .btn { width: 100%; margin-top: 10px; }
.overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
.tab-header { display: flex; gap: 5px; margin-bottom: 15px; }
.tab-btn { background: #3a4a6f; color: #8fa8c7; border: none; padding: 8px 16px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px; }
.tab-btn.active { background: #4a9eff; color: #fff; }
</style>
</head>
<body>
<div class="header">
  <h1>求职者攻略 <span class="era-badge" id="era-badge">原始劳动时代</span></h1>
  <div class="subtitle">社会经济策略模拟游戏 | 年份: <span id="game-year">1</span> | 月份: <span id="game-month">1</span></div>
</div>
<div class="container">
  <div class="stats-grid">
    <div class="stat-card" id="stat-population">
      <div class="stat-label">总人口</div>
      <div class="stat-value" id="total-population">10,000</div>
      <div class="stat-change" id="population-change">劳动力: 10,000</div>
    </div>
    <div class="stat-card" id="stat-gdp">
      <div class="stat-label">GDP</div>
      <div class="stat-value" id="gdp-value">1,000,000</div>
      <div class="stat-change" id="gdp-change">人均: 100.00</div>
    </div>
    <div class="stat-card" id="stat-employment">
      <div class="stat-label">失业率</div>
      <div class="stat-value" id="unemployment-rate">0%</div>
      <div class="stat-change" id="employed-count">就业: 0</div>
    </div>
    <div class="stat-card" id="stat-tech">
      <div class="stat-label">科技水平</div>
      <div class="stat-value" id="tech-value">0.050</div>
      <div class="stat-change" id="tech-progress">→ 手工场时代: 0.200</div>
    </div>
    <div class="stat-card" id="stat-happiness">
      <div class="stat-label">幸福指数</div>
      <div class="stat-value" id="happiness-value">50.0</div>
      <div class="progress-container"><div class="progress-bar" id="happiness-bar" style="width: 50%;"></div></div>
    </div>
    <div class="stat-card" id="stat-finance">
      <div class="stat-label">财政余额</div>
      <div class="stat-value" id="finance-balance">0</div>
      <div class="stat-change" id="debt-info">国债: 0</div>
    </div>
  </div>

  <div class="dashboard">
    <div class="section">
      <h2>政策控制</h2>
      <div class="tab-header">
        <button class="tab-btn active" onclick="switchTab(0, this)">人口</button>
        <button class="tab-btn" onclick="switchTab(1, this)">税收</button>
        <button class="tab-btn" onclick="switchTab(2, this)">公共服务</button>
        <button class="tab-btn" onclick="switchTab(3, this)">科技就业</button>
      </div>
      <div id="tab-0" class="tab-content">
        <div class="policy-item"><label>生育补贴</label><input type="range" min="0" max="200" value="0" oninput="updatePolicy('birthSubsidy', this.value)"><span class="value" id="val-birthSubsidy">0</span></div>
        <div class="policy-item"><label>生育政策</label>
          <select onchange="updateBirthPolicy(this.value)" style="padding:5px; background:#1a1a2e; color:#fff; border:1px solid #4a9eff; border-radius:4px;">
            <option value="-1">限制生育</option>
            <option value="0" selected>无政策</option>
            <option value="1">鼓励生育</option>
          </select>
        </div>
        <div class="policy-item"><label>最低工资</label><input type="range" min="10" max="100" value="20" oninput="updatePolicy('minimumWage', this.value)"><span class="value" id="val-minimumWage">20</span></div>
        <div class="policy-item"><label>独生子女政策</label><input type="checkbox" id="chk-one-child" onchange="updatePolicy('oneChildPolicy', this.checked)"></div>
      </div>
      <div id="tab-1" class="tab-content" style="display:none;">
        <div class="policy-item"><label>个人所得税</label><input type="range" min="0" max="60" value="15" oninput="updatePolicy('personalTaxRate', this.value)"><span class="value" id="val-personalTaxRate">15%</span></div>
        <div class="policy-item"><label>企业所得税</label><input type="range" min="0" max="60" value="20" oninput="updatePolicy('corporateTaxRate', this.value)"><span class="value" id="val-corporateTaxRate">20%</span></div>
        <div class="policy-item"><label>增值税</label><input type="range" min="0" max="40" value="10" oninput="updatePolicy('vatRate', this.value)"><span class="value" id="val-vatRate">10%</span></div>
      </div>
      <div id="tab-2" class="tab-content" style="display:none;">
        <div class="policy-item"><label>教育费用水平</label><input type="range" min="0" max="10" value="5" step="0.5" oninput="updatePolicy('educationFeeLevel', this.value)"><span class="value" id="val-educationFeeLevel">5.0</span></div>
        <div class="policy-item"><label>交通费用水平</label><input type="range" min="0" max="10" value="3" step="0.5" oninput="updatePolicy('transportFeeLevel', this.value)"><span class="value" id="val-transportFeeLevel">3.0</span></div>
        <div class="policy-item"><label>医疗费用水平</label><input type="range" min="0" max="10" value="4" step="0.5" oninput="updatePolicy('healthcareFeeLevel', this.value)"><span class="value" id="val-healthcareFeeLevel">4.0</span></div>
      </div>
      <div id="tab-3" class="tab-content" style="display:none;">
        <div class="policy-item"><label>研发补贴</label><input type="range" min="0" max="500" value="0" oninput="updatePolicy('rdSubsidy', this.value)"><span class="value" id="val-rdSubsidy">0</span></div>
        <div class="policy-item"><label>就业促进补贴</label><input type="range" min="0" max="200" value="0" oninput="updatePolicy('employmentSubsidy', this.value)"><span class="value" id="val-employmentSubsidy">0</span></div>
        <div class="policy-item"><label>养老金水平</label><input type="range" min="50" max="500" value="100" oninput="updatePolicy('pensionLevel', this.value)"><span class="value" id="val-pensionLevel">100</span></div>
        <div class="policy-item"><label>失业救济金</label><input type="range" min="20" max="300" value="50" oninput="updatePolicy('unemploymentBenefit', this.value)"><span class="value" id="val-unemploymentBenefit">50</span></div>
      </div>
    </div>
    <div class="section">
      <h2>事件日志</h2>
      <div class="event-list" id="event-list">
        <div class="event-item success">游戏开始！欢迎来到原始劳动时代</div>
      </div>
    </div>
  </div>

  <div class="section controls">
    <div class="button-grid">
      <button class="btn" onclick="advanceMonth()">推进 1 个月</button>
      <button class="btn" onclick="advanceYear()">推进 1 年 (12月)</button>
      <button class="btn" onclick="advanceYears(5)">快速推进 5 年</button>
      <button class="btn secondary" onclick="toggleAutoPlay()" id="autoplay-btn">自动播放</button>
      <button class="btn danger" onclick="resetGame()">重置游戏</button>
    </div>
  </div>

  <div class="section" style="margin-top:20px;">
    <h2>系统日志</h2>
    <div class="log-container" id="log-container"></div>
  </div>
</div>
<div id="popup-overlay" class="overlay" style="display:none;"></div>
<div id="popup" class="popup" style="display:none;">
  <h2 id="popup-title">时代演进！</h2>
  <p id="popup-content">你带领社会进入了新时代！</p>
  <button class="btn" onclick="closePopup()">继续</button>
</div>
<script>
const ERAS = [
  { name: '原始劳动时代', techRequired: 0, gdpPerCapitaRequired: 0, multiplier: 1 },
  { name: '手工场时代', techRequired: 0.2, gdpPerCapitaRequired: 300, multiplier: 1.5 },
  { name: '蒸汽革命时代', techRequired: 0.4, gdpPerCapitaRequired: 800, multiplier: 2 },
  { name: '电气时代', techRequired: 0.6, gdpPerCapitaRequired: 1500, multiplier: 2.5 },
  { name: '信息时代', techRequired: 0.8, gdpPerCapitaRequired: 3000, multiplier: 3 },
  { name: '大智能时代', techRequired: 1.0, gdpPerCapitaRequired: 6000, multiplier: 4 }
];
let state = {
  year: 1, month: 1, eraIndex: 0,
  totalPopulation: 10000, children: 0, elderly: 0,
  gdp: 1000000, unemploymentRate: 0, techLevel: 0.05, happinessIndex: 50,
  inflationRate: 0.02, nationalDebt: 0, governmentRevenue: 0, governmentExpenditure: 0,
  enterprises: [], persons: [], events: [],
  policy: {
    birthSubsidy: 0, birthPolicyMode: 0, oneChildPolicy: false,
    minimumWage: 20, employmentSubsidy: 0, rdSubsidy: 0,
    pensionLevel: 100, unemploymentBenefit: 50,
    personalTaxRate: 0.15, corporateTaxRate: 0.20, vatRate: 0.10,
    educationFeeLevel: 0.5, transportFeeLevel: 0.3, healthcareFeeLevel: 0.4
  },
  autoPlay: false, autoPlayTimer: null
};
function log(msg, type = '') {
  const el = document.getElementById('log-container');
  const div = document.createElement('div');
  div.className = 'log-entry ' + type;
  div.textContent = `[第${state.year}年${state.month}月] ${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}
function addEvent(text, type = '') {
  const el = document.getElementById('event-list');
  const div = document.createElement('div');
  div.className = 'event-item ' + type;
  div.innerHTML = `${text}<div class="event-time">第 ${state.year} 年 ${state.month} 月</div>`;
  el.insertBefore(div, el.firstChild);
  if (el.children.length > 20) el.removeChild(el.lastChild);
}
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function initGame() {
  state.enterprises = [];
  const industryBase = [50, 15, 15, 10, 10, 5, 5];
  const productivityBase = [50, 40, 45, 35, 40, 60, 30];
  const wageBase = [30, 25, 35, 20, 40, 15, 20];
  for (let i = 0; i < 7; i++) {
    for (let j = 0; j < industryBase[i]; j++) {
      state.enterprises.push({
        id: state.enterprises.length, industry: i, productivity: productivityBase[i],
        wageOffered: wageBase[i] + rand(-5, 10), maxEmployees: randInt(30, 80),
        employees: randInt(10, 30), profit: rand(500, 2000), state: 'growing'
      });
    }
  }
  log(`初始化完成：${state.enterprises.length}家企业 | ${state.totalPopulation}人口`);
  updateUI();
}
function updatePolicy(key, value) {
  if (key === 'oneChildPolicy') { state.policy.oneChildPolicy = value; return; }
  const numValue = parseFloat(value);
  if (key === 'personalTaxRate' || key === 'corporateTaxRate' || key === 'vatRate') state.policy[key] = numValue / 100;
  else state.policy[key] = numValue;
  document.getElementById('val-' + key).textContent = value + (key.includes('TaxRate') ? '%' : (key.includes('FeeLevel') ? '/10' : ''));
}
function updateBirthPolicy(value) { state.policy.birthPolicyMode = parseInt(value); }
function switchTab(index, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  for (let i = 0; i < 4; i++) document.getElementById('tab-' + i).style.display = (i === index) ? 'block' : 'none';
}
function advanceMonth() {
  state.month++;
  if (state.month > 12) { state.month = 1; state.year++; processYearlyChanges(); }
  simulateEconomy();
  checkEraTransition();
  updateUI();
}
function advanceYear() { for (let i = 0; i < 12; i++) advanceMonth(); }
function advanceYears(n) { for (let y = 0; y < n; y++) advanceYear(); }
function toggleAutoPlay() {
  state.autoPlay = !state.autoPlay;
  const btn = document.getElementById('autoplay-btn');
  btn.textContent = state.autoPlay ? '停止播放' : '自动播放';
  btn.classList.toggle('active', state.autoPlay);
  if (state.autoPlay) state.autoPlayTimer = setInterval(() => advanceMonth(), 400);
  else if (state.autoPlayTimer) clearInterval(state.autoPlayTimer);
}
function processYearlyChanges() {
  let birthRate = 0.02 + state.policy.birthPolicyMode * 0.01;
  birthRate += state.policy.birthSubsidy / 5000;
  if (state.policy.oneChildPolicy) birthRate -= 0.015;
  birthRate += (state.happinessIndex - 50) * 0.0005;
  birthRate -= state.eraIndex * 0.003;
  birthRate = Math.max(0.005, birthRate);
  let deathRate = 0.01 + state.elderly / state.totalPopulation * 0.05;
  deathRate += state.children / state.totalPopulation * 0.005;
  const births = Math.floor(state.totalPopulation * birthRate * 0.5);
  const deaths = Math.floor(state.totalPopulation * deathRate);
  let migrants = 0;
  if (state.happinessIndex > 70) migrants = Math.floor(state.totalPopulation * 0.005);
  else if (state.happinessIndex < 30) migrants = -Math.floor(state.totalPopulation * 0.01);
  if (state.unemploymentRate > 0.3) migrants -= 500;
  state.totalPopulation += births + migrants - deaths;
  if (births > 0) log(`人口变化: 出生${births}人, 死亡${deaths}人, 迁移${migrants > 0 ? '+' : ''}${migrants}人`);
  const ageEffect = Math.floor(state.totalPopulation * 0.02);
  state.children = Math.max(0, state.children + births - ageEffect);
  state.elderly = Math.max(0, state.elderly + Math.floor(deaths * 0.6));
}
function simulateEconomy() {
  let totalLabor = state.totalPopulation - state.children - state.elderly;
  let totalJobs = 0, totalWageBill = 0, totalRevenue = 0;
  state.enterprises.forEach(ent => {
    if (ent.state === 'bankrupt') return;
    const productivity = ent.productivity * (1 + state.techLevel * 0.5);
    const wage = Math.max(state.policy.minimumWage, ent.wageOffered * (1 + state.inflationRate));
    const output = ent.employees * productivity;
    const wageCost = ent.employees * wage;
    ent.profit += output - wageCost + rand(-500, 500);
    if (ent.profit < -2000) ent.state = 'decline';
    if (ent.profit > 5000) { ent.maxEmployees += 3; ent.state = 'growing'; }
    if (ent.profit < -5000 || (ent.state === 'decline' && ent.employees > 10)) ent.employees = Math.max(5, ent.employees - 2);
    if (ent.state === 'growing' && ent.employees < ent.maxEmployees && Math.random() < 0.3) ent.employees += 1;
    totalJobs += ent.employees;
    totalWageBill += wageCost;
    totalRevenue += output;
  });
  const employed = Math.min(totalJobs, totalLabor);
  const unemployed = Math.max(0, totalLabor - employed);
  state.unemploymentRate = totalLabor > 0 ? unemployed / totalLabor : 0;
  state.gdp += totalRevenue * 0.3 - totalWageBill * 0.1 + rand(-50000, 50000);
  state.gdp = Math.max(100000, state.gdp);
  state.inflationRate = 0.02 + (state.gdp > 2000000 ? 0.01 : 0) + state.nationalDebt / state.gdp * 0.02;
  const gdpPerCapita = state.gdp / state.totalPopulation;
  const employmentEffect = (1 - state.unemploymentRate) * 20;
  const gdpEffect = Math.min(20, gdpPerCapita / 200);
  const debtEffect = Math.max(0, 15 - state.nationalDebt / state.gdp * 10);
  const policyEffect = -state.policy.personalTaxRate * 50 - state.policy.educationFeeLevel * 2 - state.policy.healthcareFeeLevel * 1.5;
  state.happinessIndex = 20 + employmentEffect + gdpEffect + debtEffect + policyEffect + state.policy.birthPolicyMode * 3;
  state.happinessIndex = Math.max(0, Math.min(100, state.happinessIndex));
  const incomeTaxRevenue = totalWageBill * state.policy.personalTaxRate * 0.5;
  const corporateTaxRevenue = state.enterprises.filter(e => e.profit > 0).reduce((s, e) => s + e.profit, 0) * state.policy.corporateTaxRate * 0.05;
  const vatRevenue = state.gdp * 0.0005 * state.policy.vatRate;
  const publicServiceRevenue = state.children * state.policy.educationFeeLevel * 5 + state.totalPopulation * state.policy.transportFeeLevel * 3 + state.totalPopulation * state.policy.healthcareFeeLevel * 2;
  state.governmentRevenue = incomeTaxRevenue + corporateTaxRevenue + vatRevenue + publicServiceRevenue;
  const educationExpenditure = state.children * 30 + state.policy.educationFeeLevel * 2000;
  const healthcareExpenditure = state.totalPopulation * 15 + state.policy.healthcareFeeLevel * 1000;
  const socialSecurityExpenditure = state.elderly * state.policy.pensionLevel + unemployed * state.policy.unemploymentBenefit;
  const infrastructureExpenditure = 5000 + state.techLevel * 3000;
  const subsidyExpenditure = state.policy.birthSubsidy * 50 + state.policy.employmentSubsidy * 30 + state.policy.rdSubsidy * 5;
  const debtInterest = state.nationalDebt * 0.03 / 12;
  state.governmentExpenditure = educationExpenditure + healthcareExpenditure + socialSecurityExpenditure + infrastructureExpenditure + subsidyExpenditure + debtInterest;
  const balance = state.governmentRevenue - state.governmentExpenditure;
  if (balance < 0) state.nationalDebt -= balance * 0.5;
  else state.nationalDebt = Math.max(0, state.nationalDebt - balance * 0.1);
  state.nationalDebt = Math.max(0, state.nationalDebt);
  let techProgress = 0.001 + state.policy.rdSubsidy / 20000 + state.happinessIndex / 5000;
  techProgress *= ERAS[state.eraIndex].multiplier;
  state.techLevel = Math.min(1.0, state.techLevel + techProgress);
  if (state.unemploymentRate > 0.3 && Math.random() < 0.1) { addEvent(`⚠️ 高失业警告：失业率${(state.unemploymentRate * 100).toFixed(1)}%，社会动荡风险增加！`, 'crisis'); log('高失业率警报', 'warning'); }
  if (state.nationalDebt / state.gdp > 1.5 && Math.random() < 0.1) { addEvent(`🚨 债务危机！国债/GDP比${(state.nationalDebt / state.gdp * 100).toFixed(0)}%，经济面临崩溃！`, 'crisis'); log('债务危机警报', 'error'); }
  if (Math.random() < 0.03) {
    const events = [
      { text: '🔬 技术突破！研发速度提升', effect: () => state.techLevel += 0.02, type: 'success' },
      { text: '📈 经济繁荣！企业利润大幅增长', effect: () => state.gdp *= 1.05, type: 'success' },
      { text: '🌍 移民潮到来！劳动力大幅增加', effect: () => { state.totalPopulation += 500; }, type: 'success' },
      { text: '⛈️ 自然灾害！生产设施受损', effect: () => { state.gdp *= 0.97; }, type: 'crisis' },
      { text: '🦠 疫情爆发！劳动力减少', effect: () => { state.totalPopulation = Math.floor(state.totalPopulation * 0.995); state.happinessIndex -= 5; }, type: 'crisis' },
      { text: '📢 新政策成功！民众满意度提升', effect: () => state.happinessIndex += 5, type: 'success' },
      { text: '💼 企业家精神！新企业涌现', effect: () => { for (let i = 0; i < 3; i++) state.enterprises.push({ id: state.enterprises.length, industry: randInt(0, 6), productivity: 40 + rand(0, 30), wageOffered: state.policy.minimumWage + rand(5, 20), maxEmployees: randInt(30, 60), employees: randInt(10, 20), profit: rand(500, 2000), state: 'growing' }); }, type: 'success' }
    ];
    const chosen = events[randInt(0, events.length - 1)];
    chosen.effect();
    addEvent(chosen.text, chosen.type);
    log(chosen.text);
  }
}
function checkEraTransition() {
  if (state.eraIndex >= ERAS.length - 1) return;
  const nextEra = ERAS[state.eraIndex + 1];
  const gdpPerCapita = state.gdp / state.totalPopulation;
  if (state.techLevel >= nextEra.techRequired && gdpPerCapita >= nextEra.gdpPerCapitaRequired) {
    state.eraIndex++;
    showPopup(`🎉 时代演进：${nextEra.name}`, `恭喜！你成功带领社会从 ${ERAS[state.eraIndex - 1].name} 演进到 ${nextEra.name}！<br><br>关键指标：<br>科技水平: ${state.techLevel.toFixed(3)}<br>人均GDP: ${gdpPerCapita.toFixed(0)}<br><br>新的时代带来了更高的生产效率和更复杂的挑战！`);
    addEvent(`🌟 重大事件：社会进入 ${nextEra.name}！`, 'era');
    log(`时代演进: ${nextEra.name}`, 'info');
    state.enterprises.forEach(ent => { ent.productivity *= 1.3; ent.maxEmployees = Math.floor(ent.maxEmployees * 1.2); });
  }
}
function showPopup(title, content) {
  document.getElementById('popup-title').textContent = title;
  document.getElementById('popup-content').innerHTML = content;
  document.getElementById('popup-overlay').style.display = 'block';
  document.getElementById('popup').style.display = 'block';
  if (state.autoPlay) toggleAutoPlay();
}
function closePopup() {
  document.getElementById('popup-overlay').style.display = 'none';
  document.getElementById('popup').style.display = 'none';
}
function resetGame() {
  if (!confirm('确定要重置游戏吗？所有进度将丢失。')) return;
  state = {
    year: 1, month: 1, eraIndex: 0, totalPopulation: 10000, children: 0, elderly: 0,
    gdp: 1000000, unemploymentRate: 0, techLevel: 0.05, happinessIndex: 50,
    inflationRate: 0.02, nationalDebt: 0, governmentRevenue: 0, governmentExpenditure: 0,
    enterprises: [], persons: [], events: [],
    policy: {
      birthSubsidy: 0, birthPolicyMode: 0, oneChildPolicy: false, minimumWage: 20,
      employmentSubsidy: 0, rdSubsidy: 0, pensionLevel: 100, unemploymentBenefit: 50,
      personalTaxRate: 0.15, corporateTaxRate: 0.20, vatRate: 0.10,
      educationFeeLevel: 0.5, transportFeeLevel: 0.3, healthcareFeeLevel: 0.4
    },
    autoPlay: false, autoPlayTimer: null
  };
  document.querySelectorAll('input[type="range"]').forEach(inp => inp.dispatchEvent(new Event('input')));
  document.getElementById('chk-one-child').checked = false;
  document.getElementById('event-list').innerHTML = '<div class="event-item success">游戏已重置，欢迎回到原始劳动时代</div>';
  document.getElementById('log-container').innerHTML = '';
  initGame();
}
function updateUI() {
  document.getElementById('game-year').textContent = state.year;
  document.getElementById('game-month').textContent = state.month;
  document.getElementById('era-badge').textContent = ERAS[state.eraIndex].name;
  document.getElementById('total-population').textContent = state.totalPopulation.toLocaleString();
  let laborForce = state.totalPopulation - state.children - state.elderly;
  document.getElementById('population-change').textContent = `劳动力: ${laborForce.toLocaleString()} | 儿童: ${state.children.toLocaleString()} | 老年: ${state.elderly.toLocaleString()}`;
  document.getElementById('gdp-value').textContent = state.gdp.toLocaleString(undefined, {maximumFractionDigits: 0});
  document.getElementById('gdp-change').textContent = `人均: ${(state.gdp / state.totalPopulation).toFixed(0)} | 通胀: ${(state.inflationRate * 100).toFixed(1)}%`;
  document.getElementById('unemployment-rate').textContent = (state.unemploymentRate * 100).toFixed(1) + '%';
  document.getElementById('employed-count').textContent = `就业人口: ${(laborForce * (1 - state.unemploymentRate)).toFixed(0)}`;
  const statEmployment = document.getElementById('stat-employment');
  statEmployment.className = 'stat-card' + (state.unemploymentRate > 0.3 ? ' crisis' : state.unemploymentRate < 0.1 ? ' success' : ' warning');
  document.getElementById('tech-value').textContent = state.techLevel.toFixed(3);
  if (state.eraIndex < ERAS.length - 1) {
    const nextEra = ERAS[state.eraIndex + 1];
    const progress = Math.min(100, state.techLevel / nextEra.techRequired * 100);
    document.getElementById('tech-progress').textContent = `→ ${nextEra.name}: ${nextEra.techRequired.toFixed(3)} (${progress.toFixed(0)}%)`;
  } else {
    document.getElementById('tech-progress').textContent = '🎉 已达到最高时代！';
  }
  document.getElementById('happiness-value').textContent = state.happinessIndex.toFixed(1);
  document.getElementById('happiness-bar').style.width = state.happinessIndex + '%';
  const balance = state.governmentRevenue - state.governmentExpenditure;
  document.getElementById('finance-balance').textContent = (balance >= 0 ? '+' : '') + balance.toLocaleString(undefined, {maximumFractionDigits: 0});
  document.getElementById('debt-info').textContent = `国债: ${state.nationalDebt.toLocaleString(undefined, {maximumFractionDigits: 0})} (${(state.nationalDebt / state.gdp * 100).toFixed(1)}% GDP)`;
  const statFinance = document.getElementById('stat-finance');
  statFinance.className = 'stat-card' + (balance < 0 ? ' crisis' : balance > 10000 ? ' success' : ' warning');
}
initGame();
</script>
</body>
</html>
